name: Amazon checker
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12-23 * * *'
jobs:
  playwright-run:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Amazon checker
        run: npx playwright test tests/amazon.spec.js
