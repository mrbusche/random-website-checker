name: New development checker
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 23 * * *"
jobs:
  playwright-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: New development checker
        run: npx playwright test tests/new-development.spec.js
